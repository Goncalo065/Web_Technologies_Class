<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let letter=prompt("Digite um caráter:").toLocaleLowerCase();

        let vog=["a","e","i","o","u"];

        if (vog.includes(letter)){
                console.log("O caráter é uma vogal");
        }

        else{
            console.log("O caráter é uma consoante");
        }

    </script>
</body>
</html>
